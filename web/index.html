<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Novel Auto Publish - 多平台小说自动发布</title>
    <script src="tailwind.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              accent: {
                50: 'rgb(var(--accent-50) / <alpha-value>)',
                100: 'rgb(var(--accent-100) / <alpha-value>)',
                400: 'rgb(var(--accent-400) / <alpha-value>)',
                500: 'rgb(var(--accent-500) / <alpha-value>)',
                600: 'rgb(var(--accent-600) / <alpha-value>)',
                700: 'rgb(var(--accent-700) / <alpha-value>)'
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-slate-900 text-slate-200 h-screen flex flex-col overflow-hidden selection:bg-accent-500 selection:text-white">

    <!-- Top Titlebar -->
    <div class="h-8 bg-slate-950 border-b border-slate-800 titlebar flex items-center justify-between shrink-0 w-full z-50 px-4">
      <div class="text-[10px] font-bold text-slate-500 flex items-center gap-2 uppercase tracking-widest">
        <i class="fa-solid fa-layer-group text-accent-500"></i> Novel Auto Publish
      </div>
      <div class="flex items-center gap-2">
        <button id="btn-open-theme" class="no-drag text-[10px] text-slate-400 hover:text-accent-400 transition-colors uppercase tracking-wider font-bold" title="外观偏好">
          <i class="fa-solid fa-palette"></i>
        </button>
      </div>
    </div>

    <!-- Header -->
    <header class="bg-slate-900 border-b border-slate-800 p-4 flex justify-between items-center shrink-0 z-10 gap-4">
      <div class="flex items-center space-x-3 shrink-0">
        <div class="bg-gradient-to-br from-accent-600 to-accent-500 text-white rounded-xl p-2 shadow-md shadow-accent-500/30">
          <i class="fa-solid fa-pen-nib text-lg px-0.5"></i>
        </div>
        <h1 class="text-[1.1rem] font-bold tracking-widest text-white whitespace-nowrap">
          Auto Publish<span class="text-[10px] text-accent-400 font-black ml-1.5 uppercase tracking-widest bg-accent-500/10 px-1.5 py-0.5 rounded border border-accent-500/30">PRO</span>
        </h1>
      </div>

      <!-- Platform Selector + Auth -->
      <div class="flex items-center gap-3">
        <select id="platform-select" class="bg-slate-800 border border-slate-700 text-white text-[12px] font-bold rounded-lg px-3 py-2 outline-none focus:border-accent-500 focus:ring-1 focus:ring-accent-500 transition-colors cursor-pointer"></select>
        <button id="btn-login" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 hover:text-white shadow-sm transition-all px-3 py-2 rounded-lg text-[11px] flex items-center gap-1.5 font-bold no-drag">
          <i class="fa-solid fa-key"></i> 登录
        </button>
        <div id="status-badge" class="px-3 py-2 rounded-lg text-[11px] font-bold tracking-widest bg-rose-500/10 text-rose-400 border border-rose-500/30 flex items-center gap-2 shadow-sm">
          <div class="w-1.5 h-1.5 rounded-full bg-rose-500 animate-pulse"></div>
          离线
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <div class="flex-1 flex overflow-hidden p-5 gap-5 max-w-[1300px] mx-auto w-full">
      <!-- Left Panel: Controls -->
      <div class="w-[360px] min-w-[340px] bg-slate-800 rounded-2xl border border-slate-700 shadow-xl flex flex-col shrink-0 overflow-y-auto hidden-scrollbar">
        <div class="p-5 border-b border-slate-700 flex items-center justify-between shrink-0">
          <h2 class="text-[13px] font-bold tracking-widest text-slate-300 uppercase flex items-center gap-2">
            <i class="fa-solid fa-sliders text-accent-500"></i> 发布配置
          </h2>
        </div>

        <div class="p-5 flex flex-col gap-5 flex-1">
          <!-- Source Dir -->
          <div>
            <label class="block text-[11px] font-bold text-slate-400 tracking-wide mb-2">草稿来源目录</label>
            <div class="flex items-center bg-slate-900 border border-slate-700 rounded-lg overflow-hidden h-9 shadow-inner focus-within:border-accent-500">
              <button id="btn-open-source" title="打开草稿目录" class="h-full bg-slate-800 hover:bg-slate-700 px-3 transition-colors border-r border-slate-700 text-slate-400 hover:text-accent-400 shrink-0">
                <i class="fa-solid fa-folder-open"></i>
              </button>
              <input type="text" id="source-dir-input" readonly placeholder="选择或输入草稿目录..." class="w-full h-full bg-transparent text-slate-400 placeholder-slate-500 font-semibold px-3 text-[10px] outline-none truncate" />
              <button id="btn-choose-source-dir" class="h-full bg-slate-800 hover:bg-accent-600 text-slate-400 hover:text-white px-4 transition-colors border-l border-slate-700 font-bold text-[10px] shrink-0 tracking-wider">浏览</button>
            </div>
          </div>

          <!-- Archive Dir -->
          <div>
            <label class="block text-[11px] font-bold text-slate-400 tracking-wide mb-2">归档目录</label>
            <div class="flex items-center bg-slate-900 border border-slate-700 rounded-lg overflow-hidden h-9 shadow-inner focus-within:border-accent-500">
              <button id="btn-open-data" title="打开归档目录" class="h-full bg-slate-800 hover:bg-slate-700 px-3 transition-colors border-r border-slate-700 text-slate-400 hover:text-accent-400 shrink-0">
                <i class="fa-solid fa-box-archive"></i>
              </button>
              <input type="text" id="archive-dir-input" readonly placeholder="选择或输入归档目录..." class="w-full h-full bg-transparent text-slate-400 placeholder-slate-500 font-semibold px-3 text-[10px] outline-none truncate" />
              <button id="btn-choose-dir" class="h-full bg-slate-800 hover:bg-accent-600 text-slate-400 hover:text-white px-4 transition-colors border-l border-slate-700 font-bold text-[10px] shrink-0 tracking-wider">浏览</button>
            </div>
          </div>

          <!-- Book Select -->
          <div>
            <div class="flex justify-between items-center mb-2">
              <label class="block text-[11px] font-bold text-slate-400 tracking-wide">选择小说</label>
              <button id="btn-refresh" class="text-[10px] text-slate-500 hover:text-accent-400 hover:bg-slate-700 px-2 py-1 rounded transition-colors flex items-center gap-1.5 font-bold tracking-wider">
                <i class="fa-solid fa-rotate-right" id="refresh-icon"></i> 刷新
              </button>
            </div>
            <select id="book-select" class="w-full bg-slate-900 border border-slate-700 text-slate-300 text-[12px] font-bold rounded-xl p-3 outline-none focus:border-accent-500 focus:ring-1 focus:ring-accent-500 transition-colors cursor-pointer">
              <option value="">请先选择平台和目录</option>
            </select>
            <p id="book-status" class="mt-2 text-[10px] text-slate-500 tracking-wide font-mono font-semibold"></p>
          </div>

          <!-- Publish Count -->
          <div>
            <label class="block text-[11px] font-bold text-slate-400 tracking-wide mb-2">发布数量 <span class="text-slate-600">(留空=全部)</span></label>
            <input type="number" id="publish-count" placeholder="留空则发布全部未发章节" class="block w-full bg-slate-900 border border-slate-700 focus:border-accent-500 focus:ring-1 focus:ring-accent-500 text-slate-300 text-[12px] font-bold rounded-xl p-3 outline-none transition-colors placeholder-slate-600" />
          </div>

          <!-- Volume -->
          <div>
            <label class="block text-[11px] font-bold text-slate-400 tracking-wide mb-2">指定分卷 <span class="text-slate-600">(选填)</span></label>
            <input type="number" id="volume-num" placeholder="例如: 2" class="block w-full bg-slate-900 border border-slate-700 focus:border-accent-500 focus:ring-1 focus:ring-accent-500 text-slate-300 text-[12px] font-bold rounded-xl p-3 outline-none transition-colors placeholder-slate-600" />
          </div>

          <!-- Publish Button -->
          <div class="mt-auto pt-4 border-t border-slate-700 flex flex-col gap-3">
            <button id="btn-start" class="w-full bg-accent-600 hover:bg-accent-700 text-white font-black tracking-widest py-4 px-4 rounded-xl flex items-center justify-center gap-3 transition-all duration-300 transform active:scale-[0.98] shadow-lg shadow-accent-600/30 ring-1 ring-accent-500/50">
              <i class="fa-solid fa-rocket"></i> 启动全自动发布
            </button>
            <div id="progress-wrapper" class="hidden w-full bg-slate-700 rounded-full h-1.5 shadow-inner relative overflow-hidden">
              <div id="progress-bar" class="bg-accent-500 h-1.5 rounded-full transition-all duration-500 ease-out w-0 shadow-[0_0_10px_rgba(var(--accent-500),0.8)]"></div>
            </div>
            <p id="progress-text" class="hidden text-[11px] text-right text-slate-500 font-mono font-bold tracking-widest mt-1">0/0</p>
          </div>
        </div>
      </div>

      <!-- Right Panel: Log Console -->
      <div class="flex-1 bg-slate-950 rounded-2xl border border-slate-800 shadow-2xl flex flex-col overflow-hidden">
        <div class="flex justify-between items-center px-5 py-3 bg-slate-900/50 border-b border-slate-800 shrink-0">
          <span class="text-[10px] font-bold tracking-widest text-slate-500 uppercase flex items-center gap-2">
            <div class="flex gap-1.5 mr-2">
              <div class="w-2.5 h-2.5 rounded-full bg-rose-500"></div>
              <div class="w-2.5 h-2.5 rounded-full bg-amber-500"></div>
              <div class="w-2.5 h-2.5 rounded-full bg-emerald-500"></div>
            </div>
            运行日志
          </span>
          <button id="btn-clear" class="text-[10px] text-slate-600 hover:text-slate-300 transition-colors uppercase tracking-wider font-bold flex items-center gap-1.5">
            <i class="fa-solid fa-eraser"></i> 清空
          </button>
        </div>
        <div id="log-container" class="flex-1 p-5 font-mono text-[13px] overflow-y-auto text-slate-400 leading-relaxed whitespace-pre-wrap select-text">
          <div class="text-slate-600 fade-in font-semibold">> 系统就绪，请选择平台并配置目录。</div>
        </div>
      </div>
    </div>

    <!-- Theme Modal -->
    <div id="theme-modal-backdrop" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[70] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 no-drag">
      <div id="theme-modal-box" class="bg-slate-800 border border-slate-700 shadow-2xl rounded-2xl w-full max-w-lg p-8 transform scale-95 transition-transform duration-300">
        <div class="flex justify-between items-center border-b border-slate-700 pb-4 mb-6">
          <h3 class="text-base font-extrabold tracking-wider text-white flex items-center gap-2">
            <i class="fa-solid fa-palette text-accent-500"></i> 外观主题
          </h3>
          <button id="theme-modal-close" class="text-slate-400 hover:text-white transition-colors w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-700">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div class="grid grid-cols-3 gap-y-8 gap-x-4 px-4">
          <div class="flex flex-col items-center gap-3 cursor-pointer group" onclick="setTheme('blue')">
            <div id="theme-blue" class="w-14 h-14 rounded-2xl border-2 border-transparent flex items-center justify-center transition-all duration-300 hover:bg-blue-500/10">
              <div class="w-8 h-8 rounded-full bg-blue-600 shadow-md group-hover:scale-110 transition-transform"></div>
            </div>
            <span class="text-xs font-bold text-slate-300">企业蓝</span>
          </div>
          <div class="flex flex-col items-center gap-3 cursor-pointer group" onclick="setTheme('emerald')">
            <div id="theme-emerald" class="w-14 h-14 rounded-2xl border-2 border-transparent flex items-center justify-center transition-all duration-300 hover:bg-emerald-500/10">
              <div class="w-8 h-8 rounded-full bg-emerald-500 shadow-md group-hover:scale-110 transition-transform"></div>
            </div>
            <span class="text-xs font-bold text-slate-300">薄荷绿</span>
          </div>
          <div class="flex flex-col items-center gap-3 cursor-pointer group" onclick="setTheme('amber')">
            <div id="theme-amber" class="w-14 h-14 rounded-2xl border-2 border-transparent flex items-center justify-center transition-all duration-300 hover:bg-amber-500/10">
              <div class="w-8 h-8 rounded-full bg-amber-500 shadow-md group-hover:scale-110 transition-transform"></div>
            </div>
            <span class="text-xs font-bold text-slate-300">事务金</span>
          </div>
          <div class="flex flex-col items-center gap-3 cursor-pointer group" onclick="setTheme('rose')">
            <div id="theme-rose" class="w-14 h-14 rounded-2xl border-2 border-transparent flex items-center justify-center transition-all duration-300 hover:bg-rose-500/10">
              <div class="w-8 h-8 rounded-full bg-rose-500 shadow-md group-hover:scale-110 transition-transform"></div>
            </div>
            <span class="text-xs font-bold text-slate-300">玫瑰粉</span>
          </div>
          <div class="flex flex-col items-center gap-3 cursor-pointer group" onclick="setTheme('violet')">
            <div id="theme-violet" class="w-14 h-14 rounded-2xl border-2 border-transparent flex items-center justify-center transition-all duration-300 hover:bg-violet-500/10">
              <div class="w-8 h-8 rounded-full bg-violet-600 shadow-md group-hover:scale-110 transition-transform"></div>
            </div>
            <span class="text-xs font-bold text-slate-300">深空紫</span>
          </div>
          <div class="flex flex-col items-center gap-3 cursor-pointer group" onclick="setTheme('cyan')">
            <div id="theme-cyan" class="w-14 h-14 rounded-2xl border-2 border-transparent flex items-center justify-center transition-all duration-300 hover:bg-cyan-500/10">
              <div class="w-8 h-8 rounded-full bg-cyan-500 shadow-md group-hover:scale-110 transition-transform"></div>
            </div>
            <span class="text-xs font-bold text-slate-300">极光青</span>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
